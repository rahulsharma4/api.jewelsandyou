<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JewelsNYou Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="bg-blue-600 text-white p-4">
            <h1 class="text-2xl font-bold">JewelsNYou Admin Panel</h1>
        </header>

        <div class="flex">
            <!-- Sidebar -->
            <nav class="w-64 bg-gray-800 text-white min-h-screen p-4">
                <ul class="space-y-2">
                    <li><a href="#dashboard" class="block p-2 hover:bg-gray-700 rounded">Dashboard</a></li>
                    <li><a href="#products" class="block p-2 hover:bg-gray-700 rounded">Products</a></li>
                    <li><a href="#orders" class="block p-2 hover:bg-gray-700 rounded">Orders</a></li>
                    <li><a href="#add-product" class="block p-2 hover:bg-gray-700 rounded">Add Product</a></li>
                </ul>
            </nav>

            <!-- Main Content -->
            <main class="flex-1 p-6">
                <!-- Dashboard -->
                <div id="dashboard" class="content-section">
                    <h2 class="text-3xl font-bold mb-6">Dashboard</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-white p-6 rounded-lg shadow">
                            <h3 class="text-lg font-semibold">Total Products</h3>
                            <p class="text-3xl font-bold text-blue-600" id="totalProducts">0</p>
                        </div>
                        <div class="bg-white p-6 rounded-lg shadow">
                            <h3 class="text-lg font-semibold">Total Orders</h3>
                            <p class="text-3xl font-bold text-green-600" id="totalOrders">0</p>
                        </div>
                        <div class="bg-white p-6 rounded-lg shadow">
                            <h3 class="text-lg font-semibold">Total Revenue</h3>
                            <p class="text-3xl font-bold text-purple-600" id="totalRevenue">$0</p>
                        </div>
                    </div>
                </div>

                <!-- Products -->
                <div id="products" class="content-section hidden">
                    <h2 class="text-3xl font-bold mb-6">Products</h2>
                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <table class="min-w-full">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Price</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Category</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="productsTable" class="bg-white divide-y divide-gray-200">
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Orders -->
                <div id="orders" class="content-section hidden">
                    <h2 class="text-3xl font-bold mb-6">Orders</h2>
                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <table class="min-w-full">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Order ID</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Customer</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Total</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="ordersTable" class="bg-white divide-y divide-gray-200">
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Add Product -->
                <div id="add-product" class="content-section hidden">
                    <h2 class="text-3xl font-bold mb-6">Add New Product</h2>
                    <form id="productForm" class="bg-white p-6 rounded-lg shadow">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Product Name</label>
                                <input type="text" id="productName" class="w-full border border-gray-300 rounded-md px-3 py-2" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Price</label>
                                <input type="number" id="productPrice" class="w-full border border-gray-300 rounded-md px-3 py-2" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                                <select id="productCategory" class="w-full border border-gray-300 rounded-md px-3 py-2" required>
                                    <option value="">Select Category</option>
                                    <option value="Rings">Rings</option>
                                    <option value="Necklaces">Necklaces</option>
                                    <option value="Earrings">Earrings</option>
                                    <option value="Bracelets">Bracelets</option>
                                    <option value="Watches">Watches</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Stock</label>
                                <input type="number" id="productStock" class="w-full border border-gray-300 rounded-md px-3 py-2" required>
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                                <textarea id="productDescription" class="w-full border border-gray-300 rounded-md px-3 py-2" rows="3" required></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Product Image</label>
                                <input type="file" id="productImage" class="w-full border border-gray-300 rounded-md px-3 py-2" accept="image/*" required>
                            </div>
                        </div>
                        <div class="mt-6">
                            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700">Add Product</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let authToken = localStorage.getItem('adminToken');

        // Navigation
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.content-section').forEach(section => {
                    section.classList.add('hidden');
                });
                document.getElementById(link.getAttribute('href').substring(1)).classList.remove('hidden');
            });
        });

        // Load dashboard stats
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                document.getElementById('totalProducts').textContent = data.totalProducts;
                document.getElementById('totalOrders').textContent = data.totalOrders;
                document.getElementById('totalRevenue').textContent = `$${data.totalRevenue}`;
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        // Load products
        async function loadProducts() {
            try {
                const response = await fetch(`${API_BASE}/admin/products`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                const tbody = document.getElementById('productsTable');
                tbody.innerHTML = data.products.map(product => `
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${product.name}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">$${product.price}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${product.category}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <button onclick="editProduct('${product._id}')" class="text-blue-600 hover:text-blue-900">Edit</button>
                            <button onclick="deleteProduct('${product._id}')" class="text-red-600 hover:text-red-900 ml-2">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        // Load orders
        async function loadOrders() {
            try {
                const response = await fetch(`${API_BASE}/admin/orders`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                const tbody = document.getElementById('ordersTable');
                tbody.innerHTML = data.orders.map(order => `
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${order._id}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${order.user.name}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">$${order.total}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${order.status}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <select onchange="updateOrderStatus('${order._id}', this.value)">
                                <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>Processing</option>
                                <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>Shipped</option>
                                <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                            </select>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }

        // Add product
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('productName').value);
            formData.append('price', document.getElementById('productPrice').value);
            formData.append('category', document.getElementById('productCategory').value);
            formData.append('stock', document.getElementById('productStock').value);
            formData.append('description', document.getElementById('productDescription').value);
            formData.append('image', document.getElementById('productImage').files[0]);

            try {
                const response = await fetch(`${API_BASE}/admin/products`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` },
                    body: formData
                });
                if (response.ok) {
                    alert('Product added successfully!');
                    document.getElementById('productForm').reset();
                    loadProducts();
                }
            } catch (error) {
                console.error('Error adding product:', error);
            }
        });

        // Update order status
        async function updateOrderStatus(orderId, status) {
            try {
                await fetch(`${API_BASE}/admin/orders/${orderId}/status`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status })
                });
            } catch (error) {
                console.error('Error updating order:', error);
            }
        }

        // Delete product
        async function deleteProduct(productId) {
            if (confirm('Are you sure you want to delete this product?')) {
                try {
                    await fetch(`${API_BASE}/admin/products/${productId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${authToken}` }
                    });
                    loadProducts();
                } catch (error) {
                    console.error('Error deleting product:', error);
                }
            }
        }

        // Initialize
        if (!authToken) {
            const token = prompt('Enter admin token:');
            if (token) {
                localStorage.setItem('adminToken', token);
                authToken = token;
            }
        }

        loadDashboard();
        loadProducts();
        loadOrders();
    </script>
</body>
</html>
